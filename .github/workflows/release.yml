name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      releaseName:
        description: 'Release name/version (leave empty to use current version from build.gradle)'
        required: false
        default: ''
      increaseVersion:
        description: 'Increase versionCode'
        required: false
        type: boolean
        default: true
      publishPlayStore:
        description: 'Publish to Google Play Store'
        required: false
        type: boolean
        default: true
      publishGitHub:
        description: 'Publish to GitHub Release'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Extract version and update if needed
        id: version
        run: |
          GRADLE_FILE="app/build.gradle"
          CURRENT_VERSION=$(grep 'versionName' "$GRADLE_FILE" | grep -o '".*"' | sed 's/"//g' | head -1)
          CURRENT_CODE=$(grep 'versionCode' "$GRADLE_FILE" | head -1 | grep -o '[0-9]\+')
          
          RELEASE_NAME="${{ inputs.releaseName }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$CURRENT_VERSION"
          fi
          
          NEW_CODE=$CURRENT_CODE
          if [ "${{ inputs.increaseVersion }}" = "true" ]; then
            NEW_CODE=$((CURRENT_CODE + 1))
            sed -i "s/versionName \".*\"/versionName \"$RELEASE_NAME\"/" "$GRADLE_FILE"
            sed -i "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" "$GRADLE_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$GRADLE_FILE"
            git commit -m "Create new release: $RELEASE_NAME ($NEW_CODE)"
            git push origin HEAD:${{ github.ref }}
          fi
          
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$NEW_CODE" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: google-services.json and extra strings file
        env:
          GOOGLE_SERVICES_BASE64: ${{secrets.GOOGLE_SERVICES_BASE64}}
          STRINGS_OTHER_BASE64: ${{secrets.STRINGS_OTHER}}
        run: |
          python3 .github/scripts/write_google_services.py
          if [ -n "$STRINGS_OTHER_BASE64" ]; then
            echo "$STRINGS_OTHER_BASE64" | base64 --decode > ./app/src/main/res/values/strings_other.xml
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No keystore secret available, skipping keystore decode"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore-orig
          openssl pkcs12 -in release-keystore-orig -nodes -nocerts -out key.pem -passin pass:"$KEYSTORE_PASS"
          openssl pkcs12 -in release-keystore-orig -nokeys -out cert.pem -passin pass:"$KEYSTORE_PASS"
          openssl pkcs12 -export -in cert.pem -inkey key.pem -out release-keystore -name immich -passout pass:"$KEYSTORE_PASS" -legacy

      - name: Build APK and AAB
        id: build
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release-keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -f "$RELEASE_KEYSTORE_PATH" ]; then
            ./gradlew assembleRelease bundleRelease
            echo "build_type=release" >> $GITHUB_OUTPUT
          else
            echo "No keystore file found, building debug APK instead"
            ./gradlew assembleDebug
            echo "build_type=debug" >> $GITHUB_OUTPUT
          fi

      - name: Get commit messages since last release
        id: get_commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Last tag: $LAST_TAG"
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found. Getting all commits."
            git log --pretty=format:'%h %s' | awk '!/^[0-9a-f]+ Create new release:/ && !/^[0-9a-f]+ Initial plan$/' > commits.txt
            git log --pretty=format:'%s' | awk '!/^Create new release:/ && !/^Initial plan$/' > commits_playstore.txt
          else
            echo "Previous tag: $LAST_TAG"
            git log "$LAST_TAG"..HEAD --pretty=format:'%h %s' | awk '!/^[0-9a-f]+ Create new release:/ && !/^[0-9a-f]+ Initial plan$/' > commits.txt
            git log "$LAST_TAG"..HEAD --pretty=format:'%s' | awk '!/^Create new release:/ && !/^Initial plan$/' > commits_playstore.txt
          fi

      - name: Set release notes
        id: set_release_notes
        run: |
          {
            echo "value<<EOF"
            cat commits.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Release Notes:"
          cat commits.txt

      - name: Prepare Play Store release notes
        run: |
          mkdir -p play-whatsnew
          python3 - <<'PY'
          from pathlib import Path
          if Path("commits_playstore.txt").exists():
              notes = Path("commits_playstore.txt").read_text()
              Path("play-whatsnew/whatsnew-en-US").write_text(notes[:500])
          PY
          ls -ltr app/build/outputs/bundle/release 2>/dev/null || echo "No release bundle output"
          ls -ltr app/build/outputs/apk/release 2>/dev/null || echo "No release APK output"

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        if: steps.build.outputs.build_type == 'release' && (github.event_name != 'workflow_dispatch' || inputs.publishPlayStore)
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: nl.giejay.android.tv.immich
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: ${{ vars.PLAY_STORE_TRACK || 'production' }}
          status: ${{ vars.PLAY_STORE_STATUS || 'completed' }}
          whatsNewDirectory: play-whatsnew

      - name: Create GitHub Release
        if: steps.build.outputs.build_type == 'release' && (github.event_name != 'workflow_dispatch' || inputs.publishGitHub)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && steps.version.outputs.release_name || github.ref_name }}"
          TITLE="Release ${{ steps.version.outputs.release_name }}"
          NOTES=$(cat commits.txt 2>/dev/null || echo "")
          APK=$(ls -1 app/build/outputs/apk/release/*.apk 2>/dev/null | head -n 1 || true)
          AAB=$(ls -1 app/build/outputs/bundle/release/*.aab 2>/dev/null | head -n 1 || true)
          
          # Delete existing release if any, then create fresh
          gh release delete "$TAG" --yes 2>/dev/null || true
          
          ASSETS=""
          if [ -n "$APK" ]; then ASSETS="$APK"; fi
          if [ -n "$AAB" ]; then ASSETS="$ASSETS $AAB"; fi
          
          if [ -n "$ASSETS" ]; then
            gh release create "$TAG" $ASSETS --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-tv-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
